name: Check secrets

on:
  push:
    branches: [ master ]

env:
  MY_VAR: "MY_VAR"
  APP_NAME: "mi-app"

jobs:
  check-secrets:
    runs-on: ubuntu-latest

    env:
      MY_VAR_ENV: "MY_VAR"
    
    steps:
      - name: Check secrets
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        
        run: |
          echo "=== Verificando secrets ==="

          Global: $MY_VAR_ENV
          Job: $MY_VAR
          
          # Verificar SERVER_IP
          if [ -z "$SERVER_IP" ]; then
            echo "❌ SERVER_IP is EMPTY or NOT SET"
          else
            echo "✅ SERVER_IP exists: $SERVER_IP"
          fi
          
          # Verificar SERVER_USER
          if [ -z "$SERVER_USER" ]; then
            echo "❌ SERVER_USER is EMPTY or NOT SET"
          else
            echo "✅ SERVER_USER exists: $SERVER_USER"
          fi
          
          # Verificar SSH_PRIVATE_KEY (solo si existe, sin mostrar el contenido)
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "❌ SSH_PRIVATE_KEY is EMPTY or NOT SET"
          else
            echo "✅ SSH_PRIVATE_KEY exists (length: ${#SSH_PRIVATE_KEY} characters)"
          fi