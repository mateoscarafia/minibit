name: Test SSH Connection

on:
  push:
    branches: [ master ]

jobs:
  test-ssh:
    runs-on: ubuntu-latest
    
    steps:
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.0
        run: echo "$MY_VAR!"
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "¡Conexión exitosa!"
            whoami
            pwd
            ls -la