name: Minibit CI/CD workflow

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci
        env:
          # For public npm (optional, but good practice)
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || '' }}
          # For GitHub Packages
          # NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check commit message format
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: commitlint.config.js
          failOnWarnings: true

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

  cd:
    runs-on: ubuntu-latest

    steps:
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 5529
          debug: true
          script: |
            # Change to directory (check if exists)
            cd /root/minibit|| { echo "Directory /minibit not found"; exit 1; }

            # Show current directory and user
            echo "Current directory: $(pwd)"
            echo "User: $(whoami)"

            # Pull code source (with error handling)
            echo "Pulling latest code..."
            git pull origin master || { echo "Git pull failed"; exit 1; }

            # Check PM2 processes exist before stopping
            echo "Stopping PM2 processes..."
            pm2 list

            # Stop processes if they exist
            pm2 stop 1 || echo "Process 1 not running"
            pm2 stop 0 || echo "Process 0 not running"

            # Start PM2 (with error handling)
            echo "Starting app..."
            pm2 start app.js || { echo "Failed to start app"; exit 1; }

            # Show PM2 status
            pm2 list

            echo "Deployment completed successfully"
